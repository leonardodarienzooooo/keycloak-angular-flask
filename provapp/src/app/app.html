<nav style="padding: 15px; background-color: #f8f9fa; border-bottom: 1px solid #dee2e6;">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
  &nbsp;

  @if (auth.isLoggedIn()) {
    <a routerLink="/profile" routerLinkActive="active">Profile</a>
    &nbsp;
    <a routerLink="/spesa" routerLinkActive="active">Lista spesa</a>
    &nbsp;

    <!-- Link visibile solo ai user_plus -->
    @if (auth.hasRole('user_plus')) {
      <a routerLink="/plus" routerLinkActive="active" style="color: gold; font-weight: bold; background: #333; padding: 2px 5px; border-radius: 3px;">
        Area Plus 🌟
      </a>
      &nbsp;
    }

    <span>| Loggato come: <strong>{{ auth.getUsername() }}</strong></span>
    &nbsp;
    <button (click)="auth.logout()">Logout</button>
  } @else {
    <button (click)="auth.login()">Login</button>
  }
</nav>

<main style="padding: 20px;">
  <router-outlet />
</main>
